<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 110" fill="none">
  <style>
    @keyframes swing1 { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
    @keyframes swing2 { 0%,100% { transform: rotate(1.5deg); } 50% { transform: rotate(-1.5deg); } }
    @keyframes swing3 { 0%,100% { transform: rotate(-1deg); } 50% { transform: rotate(2.5deg); } }
    .t1 { animation: swing1 3s ease-in-out infinite; }
    .t2 { animation: swing2 3.2s ease-in-out infinite 0.3s; }
    .t3 { animation: swing3 2.8s ease-in-out infinite 0.6s; }
    .t4 { animation: swing1 3.4s ease-in-out infinite 0.9s; }
    .t5 { animation: swing2 3s ease-in-out infinite 1.2s; }
    .t6 { animation: swing3 3.1s ease-in-out infinite 0.4s; }
    .t7 { animation: swing1 2.9s ease-in-out infinite 0.7s; }
    .t8 { animation: swing2 3.3s ease-in-out infinite 1s; }
  </style>
  <!-- clothesline -->
  <path d="M30 18 Q175 8 350 15 Q525 22 670 12" stroke="#D4A574" stroke-width="1.5" fill="none"/>
  <!-- poles -->
  <line x1="30" y1="2" x2="30" y2="20" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
  <line x1="670" y1="2" x2="670" y2="14" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>

  <!-- hanging tags -->
  <g class="t1" transform-origin="100 12">
    <line x1="100" y1="12" x2="100" y2="28" stroke="#999" stroke-width="0.8"/>
    <rect x="75" y="28" width="50" height="24" rx="5" fill="#FFF0F5" stroke="#FFB4C8" stroke-width="1"/>
    <text x="100" y="44" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B6B9E">react</text>
  </g>
  <g class="t2" transform-origin="175 10">
    <line x1="175" y1="10" x2="175" y2="28" stroke="#999" stroke-width="0.8"/>
    <rect x="150" y="28" width="50" height="24" rx="5" fill="#F0FFF0" stroke="#88D8B0" stroke-width="1"/>
    <text x="175" y="44" text-anchor="middle" font-family="monospace" font-size="9" fill="#5A8B5A">node.js</text>
  </g>
  <g class="t3" transform-origin="250 12">
    <line x1="250" y1="12" x2="250" y2="28" stroke="#999" stroke-width="0.8"/>
    <rect x="225" y="28" width="50" height="24" rx="5" fill="#F5F0FF" stroke="#C8A2E8" stroke-width="1"/>
    <text x="250" y="44" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B4F8B">python</text>
  </g>
  <g class="t4" transform-origin="325 14">
    <line x1="325" y1="14" x2="325" y2="28" stroke="#999" stroke-width="0.8"/>
    <rect x="300" y="28" width="50" height="24" rx="5" fill="#FFF5E6" stroke="#FFB347" stroke-width="1"/>
    <text x="325" y="44" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B6B3E">fastapi</text>
  </g>
  <g class="t5" transform-origin="400 15">
    <line x1="400" y1="15" x2="400" y2="28" stroke="#999" stroke-width="0.8"/>
    <rect x="375" y="28" width="50" height="24" rx="5" fill="#FFF0F5" stroke="#FF9EB5" stroke-width="1"/>
    <text x="400" y="44" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B3E5A">nestjs</text>
  </g>
  <g class="t6" transform-origin="475 14">
    <line x1="475" y1="14" x2="475" y2="28" stroke="#999" stroke-width="0.8"/>
    <rect x="450" y="28" width="50" height="24" rx="5" fill="#F0FFF0" stroke="#88D8B0" stroke-width="1"/>
    <text x="475" y="44" text-anchor="middle" font-family="monospace" font-size="9" fill="#5A8B5A">postgres</text>
  </g>
  <g class="t7" transform-origin="550 13">
    <line x1="550" y1="13" x2="550" y2="28" stroke="#999" stroke-width="0.8"/>
    <rect x="525" y="28" width="50" height="24" rx="5" fill="#F5F0FF" stroke="#C8A2E8" stroke-width="1"/>
    <text x="550" y="44" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B4F8B">docker</text>
  </g>
  <g class="t8" transform-origin="625 12">
    <line x1="625" y1="12" x2="625" y2="28" stroke="#999" stroke-width="0.8"/>
    <rect x="600" y="28" width="50" height="24" rx="5" fill="#FFF5E6" stroke="#FFB347" stroke-width="1"/>
    <text x="625" y="44" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B6B3E">solidity</text>
  </g>

  <!-- second row -->
  <path d="M80 62 Q250 55 400 60 Q550 65 620 58" stroke="#D4A574" stroke-width="1" fill="none" opacity="0.5"/>
  <g class="t3" transform-origin="160 58">
    <line x1="160" y1="58" x2="160" y2="70" stroke="#999" stroke-width="0.8"/>
    <rect x="135" y="70" width="50" height="24" rx="5" fill="#FFF0F5" stroke="#FFB4C8" stroke-width="1"/>
    <text x="160" y="86" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B6B9E">tailwind</text>
  </g>
  <g class="t1" transform-origin="260 57">
    <line x1="260" y1="57" x2="260" y2="70" stroke="#999" stroke-width="0.8"/>
    <rect x="235" y="70" width="50" height="24" rx="5" fill="#F0FFF0" stroke="#88D8B0" stroke-width="1"/>
    <text x="260" y="86" text-anchor="middle" font-family="monospace" font-size="9" fill="#5A8B5A">express</text>
  </g>
  <g class="t5" transform-origin="360 59">
    <line x1="360" y1="59" x2="360" y2="70" stroke="#999" stroke-width="0.8"/>
    <rect x="335" y="70" width="50" height="24" rx="5" fill="#F5F0FF" stroke="#C8A2E8" stroke-width="1"/>
    <text x="360" y="86" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B4F8B">prisma</text>
  </g>
  <g class="t2" transform-origin="460 61">
    <line x1="460" y1="61" x2="460" y2="70" stroke="#999" stroke-width="0.8"/>
    <rect x="435" y="70" width="50" height="24" rx="5" fill="#FFF5E6" stroke="#FFB347" stroke-width="1"/>
    <text x="460" y="86" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B6B3E">gcp</text>
  </g>
  <g class="t4" transform-origin="560 59">
    <line x1="560" y1="59" x2="560" y2="70" stroke="#999" stroke-width="0.8"/>
    <rect x="535" y="70" width="50" height="24" rx="5" fill="#FFF0F5" stroke="#FF9EB5" stroke-width="1"/>
    <text x="560" y="86" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B3E5A">mongodb</text>
  </g>
</svg>
