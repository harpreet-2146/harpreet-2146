<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" fill="none">
  <style>
    @keyframes glow { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes wave { 0%,100% { transform: translateX(0); } 50% { transform: translateX(10px); } }
    .g1 { animation: glow 3s ease-in-out infinite; }
    .g2 { animation: glow 3s ease-in-out infinite 1s; }
    .g3 { animation: glow 3s ease-in-out infinite 2s; }
    .w1 { animation: wave 6s ease-in-out infinite; }
  </style>
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE8F0" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFD4E0"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="100" fill="url(#sunset)"/>
  <!-- rolling hills -->
  <path d="M0 70 Q100 50 200 65 Q300 80 400 60 Q500 45 600 62 Q700 78 800 55 V100 H0 Z" fill="#C8E6A0" opacity="0.3"/>
  <path d="M0 80 Q150 65 300 78 Q450 88 600 72 Q750 60 800 75 V100 H0 Z" fill="#A8D882" opacity="0.25"/>
  <!-- tiny flowers on hills -->
  <circle class="g1" cx="150" cy="68" r="2.5" fill="#FF9EB5"/>
  <circle class="g2" cx="350" cy="63" r="2" fill="#C8A2E8"/>
  <circle class="g3" cx="550" cy="58" r="2.5" fill="#FFB4C8"/>
  <circle class="g1" cx="650" cy="65" r="2" fill="#88D8B0"/>
  <circle class="g2" cx="250" cy="72" r="2" fill="#FFE066"/>
  <circle class="g3" cx="450" cy="67" r="2.5" fill="#FFB4C8"/>
  <!-- text -->
  <text x="400" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#8B6B9E" font-style="italic" opacity="0.7">built with care, shipped with intention ✿</text>
</svg>
